<script>
    const URL_SCRIPT_ESTOQUE = "https://script.google.com/macros/s/AKfycbxPSfcIHthWXzR9h1auu2WGQ1xUqwDSHVaZ4aQJXWGW14LTpNSKVngz3BZ1r6x8mq33/exec";
    const linkPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR0m7HN1ePfdwVgr0aaFfYjjFv6r1zag8fZ4x5Ih8XKPLjEIe97nRHqU-hWKWfBEksbOH5Mw8u2Y6VZ/pub?output=csv";
    
    let produtosData = [], carrinho = [], selecoesTemporarias = {};
    let fotosAtuais = [], fotoIndice = 0;

    function toggleMenu() {
        const m = document.getElementById('sideMenu');
        const o = document.getElementById('overlay');
        m.classList.toggle('active');
        o.style.display = m.classList.contains('active') ? 'block' : 'none';
    }

    function togglePolitica() {
        document.getElementById('modal-politica').classList.toggle('active');
    }

    function abrirPolitica() {
        toggleMenu(); 
        togglePolitica(); 
    }

    function fecharPolitica(e) {
        if(e.target.id === 'modal-politica') togglePolitica();
    }

    function toggleCepInput() {
        const entrega = document.getElementById('forma-entrega').value;
        const inputCep = document.getElementById('cep-destino');
        if (entrega === 'retirar') {
            inputCep.value = "";
            inputCep.disabled = true;
            inputCep.placeholder = "Não necessário p/ retirada";
        } else {
            inputCep.disabled = false;
            inputCep.placeholder = "00000-000";
        }
    }

    // ALTERAÇÃO SOLICITADA: FUNÇÃO DE CARREGAMENTO CORRIGIDA
    async function carregarProdutos() {
        try {
            const r = await fetch(linkPlanilha);
            const t = await r.text();
            const linhas = t.split('\n').slice(1);
            const grid = document.getElementById('grid-produtos');
            
            // Limpa o "Carregando estoque..." assim que recebe os dados
            grid.innerHTML = "";
            produtosData = []; 

            linhas.forEach(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                if(c.length < 5) return;

                const imagemLimpa = c[4].replace(/["\r\n]/g, '').trim();

                const p = {
                    id: c[0].replace(/"/g, '').trim(), 
                    nome: c[1].replace(/"/g, '').trim(), 
                    preco: parseFloat(c[2]), 
                    atacado: parseFloat(c[3]), 
                    imagem: imagemLimpa,
                    // Índices: 5=P, 6=M, 7=G, 8=GG, 9=2GG, 10=Categoria
                    estoque: { P: parseInt(c[5])||0, M: parseInt(c[6])||0, G: parseInt(c[7])||0, GG: parseInt(c[8])||0, "2GG": parseInt(c[9])||0 },
                    categoria: c[10] ? c[10].replace(/"/g, '').trim().toLowerCase() : "todos"
                };
                produtosData.push(p);
                
                const fotosArray = p.imagem.split(',').map(f => f.trim()).filter(f => f !== "");
                const primeiraFoto = fotosArray[0];
                
                let tams = "";
                for (let tam in p.estoque) {
                    if (p.estoque[tam] > 0) tams += `<button onclick="selecionarTamanho(this, '${p.id}')" class="size-box">${tam}</button>`;
                    else tams += `<button class="size-box size-off">${tam}</button>`;
                }
                grid.innerHTML += `
                    <div class="card-artilheiro item-produto" data-nome="${p.nome.toLowerCase()}" data-cat="${p.categoria}" id="${p.id}">
                        <img src="${primeiraFoto}" onclick="abrirGaleria('${p.id}')" class="w-full h-44 object-cover cursor-zoom-in" onerror="this.src='https://via.placeholder.com/300?text=Link+Incorreto'">
                        <h3 class="text-[10px] px-2 h-8 text-center font-bold mt-1 uppercase">${p.nome}</h3>
                        <span class="price-main">R$ ${p.preco.toFixed(2)}</span>
                        <div class="atacado-box">
                            <span class="text-[8px] text-yellow-700 font-bold uppercase">Atacado (4+ un): R$ ${p.atacado.toFixed(2)}</span>
                        </div>
                        <div class="flex flex-wrap justify-center gap-1 my-2 px-1">${tams}</div>
                        <button onclick="adicionarAoCarrinho('${p.id}')" class="w-[90%] btn-dourado py-2 rounded text-[11px] uppercase">Comprar</button>
                    </div>`;
            });

            // Garante que o filtro inicial mostre os produtos carregados
            filtrarProdutos('todos');

        } catch (e) { 
            console.error("Erro ao carregar planilha", e);
            document.getElementById('grid-produtos').innerHTML = `<p class="text-center col-span-2 py-10">Erro ao carregar o estoque. Tente atualizar a página.</p>`;
        }
    }

    function abrirGaleria(id) {
        const p = produtosData.find(x => x.id === id);
        if(!p) return;
        fotosAtuais = p.imagem.split(',').map(f => f.trim()).filter(f => f !== "");
        if (fotosAtuais.length === 0) return;
        fotoIndice = 0;
        document.getElementById('img-ampliada').src = fotosAtuais[0];
        document.getElementById('modal-galeria').classList.add('active');
        document.getElementById('nav-galeria').style.display = fotosAtuais.length > 1 ? 'flex' : 'none';
    }

    function mudarFotoGaleria(direcao) {
        if(fotosAtuais.length <= 1) return;
        fotoIndice = (fotoIndice + direcao + fotosAtuais.length) % fotosAtuais.length;
        document.getElementById('img-ampliada').src = fotosAtuais[fotoIndice];
    }

    function fecharGaleria(e) {
        if(e.target.id === 'modal-galeria') toggleGaleria();
    }

    function toggleGaleria() {
        document.getElementById('modal-galeria').classList.toggle('active');
    }

    function buscarNoGrid() {
        const termo = document.getElementById('input-busca').value.toLowerCase();
        document.querySelectorAll('.item-produto').forEach(p => {
            p.style.display = p.getAttribute('data-nome').includes(termo) ? "flex" : "none";
        });
    }

    function filtrarProdutos(cat) {
        // Verifica se o menu está aberto antes de tentar fechar (evita erro no carregamento inicial)
        if(document.getElementById('sideMenu').classList.contains('active')) toggleMenu();
        
        const titulo = document.getElementById('titulo-secao');
        const busca = document.getElementById('input-busca');
        busca.value = "";
        titulo.innerText = cat === 'todos' ? "Lançamentos" : cat.replace(/-/g, ' ').toUpperCase();
        document.querySelectorAll('.item-produto').forEach(p => {
            const pCat = p.getAttribute('data-cat');
            p.style.display = (cat === 'todos' || pCat === cat) ? "flex" : "none";
        });
    }

    function selecionarTamanho(btn, id) {
        document.getElementById(id).querySelectorAll('.size-box').forEach(b => b.classList.remove('size-selected'));
        btn.classList.add('size-selected');
        selecoesTemporarias[id] = btn.innerText;
    }

    function adicionarAoCarrinho(id) {
        const p = produtosData.find(x => x.id === id);
        const t = selecoesTemporarias[id];
        if (!t) { alert("Escolha o tamanho!"); return; }
        const estoqueDisponivel = p.estoque[t];
        const jaTemIdx = carrinho.findIndex(i => i.id === id && i.tamanho === t);
        const qtdNoCarrinho = jaTemIdx !== -1 ? carrinho[jaTemIdx].qtd : 0;
        if (qtdNoCarrinho + 1 > estoqueDisponivel) {
            alert(`Limite atingido! Temos apenas ${estoqueDisponivel} unidade(s) do tamanho ${t} em estoque.`);
            return;
        }
        if (jaTemIdx !== -1) {
            carrinho[jaTemIdx].qtd++;
        } else {
            carrinho.push({ id, nome: p.nome, tamanho: t, precoVarejo: p.preco, precoAtacado: p.atacado, qtd: 1 });
        }
        document.getElementById('cart-count').innerText = carrinho.reduce((s, i) => s + i.qtd, 0);
        alert("Adicionado!");
    }

    function renderizarCarrinho() {
        const lista = document.getElementById('cart-items-list');
        const aviso = document.getElementById('aviso-atacado');
        const ecoRow = document.getElementById('economia-row');
        let totalF = 0, totalV = 0;
        let qtdT = carrinho.reduce((s, i) => s + i.qtd, 0);
        let eAtacado = qtdT >= 4;
        lista.innerHTML = carrinho.length === 0 ? '<p class="text-center text-gray-400 mt-10">Vazio</p>' : '';
        carrinho.forEach((item, idx) => {
            let precoU = eAtacado ? item.precoAtacado : item.precoVarejo;
            totalF += precoU * item.qtd;
            totalV += item.precoVarejo * item.qtd;
            lista.innerHTML += `
                <div class="flex justify-between items-center border-b pb-2 text-black">
                    <div class="text-[11px]">
                        <p class="font-bold uppercase">${item.nome}</p>
                        <p class="text-red-600 font-bold">TAM: ${item.tamanho} | R$ ${precoU.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="alterarQtd(${idx},-1)" class="bg-gray-200 px-2">-</button>
                        <span>${item.qtd}</span>
                        <button onclick="alterarQtd(${idx},1)" class="bg-gray-200 px-2">+</button>
                    </div>
                </div>`;
        });
        let eco = totalV - totalF;
        if (eAtacado && eco > 0) { aviso.classList.remove('hidden'); ecoRow.classList.remove('hidden'); document.getElementById('economia-value').innerText = `R$ ${eco.toFixed(2)}`; }
        else { aviso.classList.add('hidden'); ecoRow.classList.add('hidden'); }
        document.getElementById('subtotal-value').innerText = `R$ ${totalF.toFixed(2)}`;
        document.getElementById('cart-total-value').innerText = `R$ ${totalF.toFixed(2)}`;
    }

    function alterarQtd(i, d) { 
        const item = carrinho[i];
        const pOriginal = produtosData.find(x => x.id === item.id);
        const estoqueMax = pOriginal.estoque[item.tamanho];
        if (d > 0 && item.qtd + d > estoqueMax) { alert(`Desculpe, só temos ${estoqueMax} disponíveis.`); return; }
        item.qtd += d; 
        if(item.qtd <= 0) carrinho.splice(i,1); 
        renderizarCarrinho(); 
        document.getElementById('cart-count').innerText = carrinho.reduce((s, i) => s + i.qtd, 0); 
    }

    function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); renderizarCarrinho(); }
    function moveSlide(n) { const s = document.querySelectorAll(".carousel-item"); let a = 0; s.forEach((img, i) => { if(img.classList.contains('active')){ a = i; img.classList.remove('active'); }}); let next = (a + n + s.length) % s.length; s[next].classList.add('active'); }
    setInterval(() => moveSlide(1), 5000);

    async function enviarWhatsApp() {
        if (!carrinho.length) return;
        const entrega = document.getElementById('forma-entrega').value;
        const cep = document.getElementById('cep-destino').value;
        if (entrega === 'frete' && !cep) { alert("Informe o CEP!"); return; }
        const btn = document.getElementById('btn-finalizar');
        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;
        try {
            const dadosVenda = { itens: carrinho.map(i => ({ id: i.id, tamanho: i.tamanho, qtd: i.qtd })) };
            await fetch(URL_SCRIPT_ESTOQUE, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(dadosVenda) });
        } catch (e) { console.error(e); }
        let qtdT = carrinho.reduce((s, i) => s + i.qtd, 0);
        let eAtacado = qtdT >= 4, totalF = 0;
        let msg = `🚀 *PEDIDO BRAZUKA 1.1*\n\n`;
        carrinho.forEach(i => {
            let p = eAtacado ? i.precoAtacado : i.precoVarejo;
            totalF += p * i.qtd;
            msg += `✅ ${i.qtd}x ${i.nome} (${i.tamanho}) - R$ ${p.toFixed(2)}\n`;
        });
        msg += `\n📦 *Entrega:* ${entrega === 'retirar' ? 'Retirar no Local' : 'Enviar por Frete (CEP: '+cep+')'}`;
        msg += `\n💰 *Total: R$ ${totalF.toFixed(2)}*`;
        msg += `\n\n💳 *Pagamento via:* ( ) Pix  ( ) Cartão de Crédito`;
        msg += `\n\n_Pode gerar meu link de pagamento, por favor?_`;
        
        window.open(`https://wa.me/5521986285970?text=${encodeURIComponent(msg)}`);
        location.reload();
    }

    // Inicialização
    carregarProdutos();
</script>
